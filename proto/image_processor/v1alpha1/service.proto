syntax = "proto3";

package image_processor.v1alpha1;

option go_package = "image_processor/v1alpha1;image_processor_v1alpha1";

service ImageProcessorService {
  rpc UploadImage(UploadImageRequest) returns (UploadImageResponse);
}

message UploadImageRequest { bytes image_data = 1; }

message UploadImageResponse { string uuid = 1; }