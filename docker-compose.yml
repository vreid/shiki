services:
  valkey:
    image: valkey/valkey:8-alpine
    tmpfs:
      - /data:size=512M,mode=0755
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  receiver:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/receiver/Dockerfile
    volumes:
      - ./data/receiver:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.receiver.rule=PathPrefix(`/receiver`)
      - traefik.http.services.receiver.loadbalancer.server.port=3000
      - traefik.http.middlewares.receiver-strip.stripprefix.prefixes=/receiver
      - traefik.http.routers.receiver.middlewares=receiver-strip

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    volumes:
      - ./data/processor:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.processor.rule=PathPrefix(`/processor`)
      - traefik.http.services.processor.loadbalancer.server.port=3000
      - traefik.http.middlewares.processor-strip.stripprefix.prefixes=/processor
      - traefik.http.routers.processor.middlewares=processor-strip

  processor-worker:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/processor-worker/Dockerfile
    volumes:
      - ./data/processor:/data
    deploy:
      replicas: 3

  metadata:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/metadata/Dockerfile
    volumes:
      - ./data/metadata:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.metadata.rule=PathPrefix(`/metadata`)
      - traefik.http.services.metadata.loadbalancer.server.port=3000
      - traefik.http.middlewares.metadata-strip.stripprefix.prefixes=/metadata
      - traefik.http.routers.metadata.middlewares=metadata-strip

  storage:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    volumes:
      - ./data/storage:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.storage.rule=PathPrefix(`/storage`)
      - traefik.http.services.storage.loadbalancer.server.port=3000
      - traefik.http.middlewares.storage-strip.stripprefix.prefixes=/storage
      - traefik.http.routers.storage.middlewares=storage-strip

  matchmaker:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/matchmaker/Dockerfile
    deploy:
      replicas: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.matchmaker.rule=PathPrefix(`/matchmaker`)
      - traefik.http.services.matchmaker.loadbalancer.server.port=3000
      - traefik.http.middlewares.matchmaker-strip.stripprefix.prefixes=/matchmaker
      - traefik.http.routers.matchmaker.middlewares=matchmaker-strip

  recordkeeper:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/recordkeeper/Dockerfile
    volumes:
      - ./data/recordkeeper:/data

  scorer:
    depends_on:
      valkey:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/scorer/Dockerfile

  traefik:
    image: traefik:3
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - 3000:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  default:
    name: shiki-network
